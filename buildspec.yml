version: 0.2

env:
  variables:
    IMAGE_BACKEND: venky009151/backend
    IMAGE_FRONTEND: venky009151/frontend

phases:
  install:
    commands:
      - echo "Install phase started"

  pre_build:
    commands:
      - echo "Logging into Docker Hub..."
      - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

  build:
    commands:
      - echo "Building backend image..."
      - docker build -t backend ./Backend

      - echo "Building frontend image..."
      - docker build -t frontend ./Frontend

      - echo "Tagging images..."
      - docker tag backend:latest $IMAGE_BACKEND:latest
      - docker tag frontend:latest $IMAGE_FRONTEND:latest

  post_build:
    commands:
      - echo "Pushing backend..."
      - docker push $IMAGE_BACKEND:latest || docker push $IMAGE_BACKEND:latest

      - echo "Pushing frontend..."
      - docker push $IMAGE_FRONTEND:latest || docker push $IMAGE_FRONTEND:latest

artifacts:
  files:
    - '**/*'
